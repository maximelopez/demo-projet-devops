apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: demo-devops
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: frontend-config
        env:
        - name: VITE_TASKS_API_URL
          valueFrom:
            configMapKeyRef:
              name: frontend-config
              key: VITE_TASKS_API_URL
        - name: VITE_STATS_API_URL
          valueFrom:
            configMapKeyRef:
              name: frontend-config
              key: VITE_STATS_API_URL
